<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8816b"/>
      <stop offset="100%" style="stop-color:#c43025"/>
    </linearGradient>
  </defs>
  <!-- 둥근 사각형 배경 -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- 학교 건물 -->
  <rect x="22" y="42" width="56" height="38" rx="4" fill="white" opacity="0.95"/>
  <!-- 지붕 삼각형 -->
  <polygon points="50,18 14,46 86,46" fill="white" opacity="0.95"/>
  <!-- 지붕 라인 강조 -->
  <polygon points="50,24 20,46 80,46" fill="white"/>
  <!-- 문 -->
  <rect x="42" y="58" width="16" height="22" rx="8" fill="#c43025" opacity="0.8"/>
  <!-- 왼쪽 창문 -->
  <rect x="28" y="52" width="10" height="10" rx="2" fill="#c43025" opacity="0.5"/>
  <!-- 오른쪽 창문 -->
  <rect x="62" y="52" width="10" height="10" rx="2" fill="#c43025" opacity="0.5"/>
  <!-- 깃발 봉 -->
  <line x1="50" y1="18" x2="50" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- 깃발 -->
  <polygon points="50,8 64,13 50,18" fill="#fef3dc"/>
</svg>
